# .github/workflows/ml-pipeline.yml
# ===================================
# CI/CD pipeline that runs on every push to main.
#
# What it does:
#   1. Installs dependencies from requirements.txt
#   2. Trains the model (produces rf_model.joblib + shap_explainer.joblib)
#   3. Runs batch prediction (produces predictions.csv + GeoJSON files)
#   4. Quality gate — fails if CV ROC-AUC drops below 0.80
#   5. Artifact check — fails if shap_explainer.joblib is missing or empty
#   6. Uploads model artifacts so you can download them from the Actions UI
#   7. Builds the Docker image to confirm it can be containerized
#
# This means any code change that breaks training, degrades model quality,
# or breaks the Docker build will fail before it can be deployed.

name: ML Pipeline CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  train-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model and SHAP explainer
        run: python train.py

      - name: Run batch prediction pipeline
        run: python predict.py

      - name: Quality gate — ROC-AUC check
        run: |
          python - <<'EOF'
          import json, sys
          metrics   = json.load(open("model/metrics.json"))
          auc       = metrics["roc_auc_cv_mean"]
          THRESHOLD = 0.80
          print(f"CV ROC-AUC: {auc:.4f} (threshold: {THRESHOLD})")
          if auc < THRESHOLD:
              print(f"FAILED — ROC-AUC {auc:.4f} is below threshold {THRESHOLD}")
              sys.exit(1)
          print("PASSED")
          EOF

      - name: Artifact check — verify SHAP explainer exists
        run: |
          python - <<'EOF'
          import sys
          from pathlib import Path
          p = Path("model/shap_explainer.joblib")
          if not p.exists():
              print("FAILED — model/shap_explainer.joblib not found")
              sys.exit(1)
          size_kb = p.stat().st_size / 1024
          if size_kb < 1:
              print(f"FAILED — shap_explainer.joblib is suspiciously small ({size_kb:.1f} KB)")
              sys.exit(1)
          print(f"PASSED — shap_explainer.joblib exists ({size_kb:.1f} KB)")
          EOF

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            model/rf_model.joblib
            model/shap_explainer.joblib
            model/metrics.json
            model/feature_importance.json
            model/feature_stats.json
            model/training_log.json
          retention-days: 30

  docker-build:
    needs: train-and-validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t groundwater-app:ci .