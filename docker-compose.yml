# docker-compose.yml
# ==================
# Defines two services:
#   db  — PostgreSQL 16 (persistent named volume)
#   app — FastAPI application (built from Dockerfile)
#
# Common commands:
#   Start everything    : docker-compose up --build
#   Start DB only       : docker-compose up db -d
#   Stop everything     : docker-compose down
#   Stop and wipe DB    : docker-compose down -v
#   App shell           : docker-compose exec app bash
#   DB shell            : docker-compose exec db psql -U aquifer_user -d aquifer
#
# Environment variables are read from .env (see .env.example).
# Never commit .env — it contains real credentials.

version: "3.9"

services:

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: aquifer_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       aquifer
      POSTGRES_USER:     aquifer_user
      POSTGRES_PASSWORD: aquifer_pass
    ports:
      - "5432:5432"
    volumes:
      # Named volume — data survives docker-compose down (but not down -v)
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aquifer_user -d aquifer"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── FastAPI Application ───────────────────────────────────────────────────
  app:
    build: .
    container_name: aquifer_app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # 'db' resolves to the database container via Docker's internal DNS
      DATABASE_URL: postgresql://aquifer_user:aquifer_pass@db:5432/aquifer

      # Set real values in .env — docker-compose reads it automatically
      HF_API_TOKEN:  ${HF_API_TOKEN}
      HF_MODEL:      ${HF_MODEL:-mistralai/Mistral-7B-Instruct-v0.3}

      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY:    ${LANGCHAIN_API_KEY}
      LANGCHAIN_PROJECT:    ${LANGCHAIN_PROJECT:-aquifer-groundwater}

      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      PORT:       5000

    depends_on:
      db:
        # Wait for Postgres healthcheck to pass before starting the app
        condition: service_healthy

    volumes:
      # Mount source code so changes reflect without rebuilding
      - .:/app

# ── Named volumes ──────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local