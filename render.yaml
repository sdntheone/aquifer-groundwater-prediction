services:
  - type: web
    name: groundwater-prediction
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python train.py && python predict.py"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
